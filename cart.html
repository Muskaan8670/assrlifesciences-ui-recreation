<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assr Life Sciences</title>
    <link rel="stylesheet" href="css/flaticon.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div id="preloader">
      <img src="images/loadIcon.png" alt="">
</div>

<div id="top-header"></div>
<header id="navbar"></header>

<section class="about-hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>Cart</h1>

        <div class="breadcrumb">
            <a href="index.html">assrlifesciences.com</a>
            <span>›</span>
            <p>Cart</p>
        </div>
    </div>
</section>

<section class="cart-section">
    <div id="cartContainer"></div>
</section>

<footer id="footer-section"></footer>

<script>
    fetch("header.html")
    .then(response => response.text())
    .then(data => {
        document.getElementById("top-header").innerHTML = data;
    });

    fetch("navbar.html")
    .then(response => response.text())
    .then(data => {
        document.getElementById("navbar").innerHTML = data;
        setActiveNav();
    });

    function setActiveNav() {
        const currentPage = window.location.pathname.split("/").pop();

        const navLinks = document.querySelectorAll(".nav-links a");

        navLinks.forEach(link => {
            if (link.getAttribute("href") === currentPage) {
                link.classList.add("active");
            }
        });
    }

    const products = [
        {
            name: "Assrmox-CV-625",
            price: 270,
            image: "images/Assrmox-CV-625.webp"
        },
        {
            name: "Assrpain-P",
            price: 55,
            image: "images/Assrpain-P.webp"
        },
        {
            name: "Assrpain-SP",
            price: 190,
            image: "images/Assrpain-SP.webp"
        },
        {
            name: "Assrpan-40",
            price: 130,
            image: "images/Assrpan-40.webp"
        }
    ];

    const cartContainer = document.getElementById("cartContainer");
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function renderCart() {
        if (cart.length === 0) {
            cartContainer.innerHTML = `
                <div class="empty-cart">
                    <svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" viewBox="0 0 38 38" fill="none">
                        <path fill="currentColor" d="M19 0C8.504 0 0 8.504 0 19s8.504 19 19 19 19-8.504 19-19S29.496 0 19 0Zm6.129 12.871a2.449 2.449 0 0 1 2.452 2.452 2.449 2.449 0 0 1-2.452 2.451 2.449 2.449 0 0 1-2.452-2.451 2.449 2.449 0 0 1 2.452-2.452ZM11.645 31.258c-2.03 0-3.677-1.609-3.677-3.6 0-1.533 2.183-4.628 3.187-5.961a.61.61 0 0 1 .98 0c1.004 1.333 3.188 4.428 3.188 5.96 0 1.992-1.648 3.601-3.678 3.601Zm1.226-13.484a2.449 2.449 0 0 1-2.452-2.451 2.449 2.449 0 0 1 2.452-2.452 2.449 2.449 0 0 1 2.452 2.452 2.449 2.449 0 0 1-2.452 2.451Zm13.04 11.814A8.989 8.989 0 0 0 19 26.355c-1.624 0-1.624-2.452 0-2.452a11.4 11.4 0 0 1 8.788 4.122c1.057 1.257-.859 2.796-1.878 1.563Z"/>
                    </svg>
                    <h3>Your cart is currently empty!</h3>
                    <h2>New in store</h2>

                    <div class="recommended-products">
                        ${products.map(product => `
                            <div class="shop-card">
                                <img src="${product.image}" alt="${product.name}">
                                <h4>${product.name}</h4>
                                <p>₹${product.price}</p>
                                <button onclick='addToCart(${JSON.stringify(product)})'>
                                    Add To Cart
                                </button>
                            </div>
                        `).join("")}
                    </div>
                </div>
            `;
        } else {
            let total = cart.reduce(
                (sum, item) => sum + (item.price * (item.quantity || 1)),
                0
            );

            cartContainer.innerHTML = `
            <div class="cart-layout">

                <div class="cart-items">

                    <div class="cart-header">
                        <h3>PRODUCT</h3>
                        <h3>TOTAL</h3>
                    </div>

                    ${cart.map((item, index) => `
                <div class="cart-item">

                <img src="${item.image}" alt="${item.name}">

                <div class="product-details">
                    <h4>${item.name}</h4>
                    <p>₹${item.price}</p>

                    <div class="cart-actions">
                        <div class="quantity-box">
                            <button onclick="decreaseQty(${index})">−</button>
                            <span>${item.quantity || 1}</span>
                            <button onclick="increaseQty(${index})">+</button>
                        </div>

            <button class="delete-btn" onclick="removeItem(${index})">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="34" height="34" aria-hidden="true" focusable="false"><path d="M20 5h-5.7c0-1.3-1-2.3-2.3-2.3S9.7 3.7 9.7 5H4v2h1.5v.3l1.7 11.1c.1 1 1 1.7 2 1.7h5.7c1 0 1.8-.7 2-1.7l1.7-11.1V7H20V5zm-3.2 2l-1.7 11.1c0 .1-.1.2-.3.2H9.1c-.1 0-.3-.1-.3-.2L7.2 7h9.6z"></path></svg>
            </button>
        </div>
    </div>

    <div class="cart-total">
        ₹${item.price * (item.quantity || 1)}
    </div>

</div>
        `).join("")}

    </div>
    <div class="summary-proceed">
    <div class="cart-summary">
    <h3>CART TOTALS</h3>

    <div class="coupon-box">

        <div class="coupon-toggle" onclick="toggleCoupon()">
            <span>Add coupons</span>

            <svg id="couponArrow" class="coupon-arrow" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24">
                <path fill="currentColor" d="M7 10L12 15L17 10"/>
            </svg>
        </div>

        <div class="coupon-input" id="couponInput">
            <input type="text" placeholder="Enter code">
            <button>Apply</button>
        </div>

    </div>

    <div class="summary-total">
        <h4>Estimated total</h4>
        <span>₹${total}</span>
    </div>
</div>
<button class="checkout-btn" onclick="window.location.href='checkout.html'">
    Proceed to Checkout
</button>
</div>
</div>
`;
        }
    }

    function addToCart(product) {
        const existingProduct = cart.find(item => item.name === product.name);

        if (existingProduct) {
            existingProduct.quantity = (existingProduct.quantity || 1) + 1;
        } else {
            product.quantity = 1;
            cart.push(product);
        }
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
    }

    function removeItem(index) {
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
    }

    function increaseQty(index) {
        cart[index].quantity = (cart[index].quantity || 1) + 1;

        localStorage.setItem("cart", JSON.stringify(cart));

        renderCart();
    }

    function decreaseQty(index) {
        if ((cart[index].quantity || 1) > 1) {
            cart[index].quantity--;

            localStorage.setItem("cart", JSON.stringify(cart));

            renderCart();
        }
    }

    function toggleCoupon() {
    const coupon = document.getElementById("couponInput");
    const arrow = document.getElementById("couponArrow");

    coupon.classList.toggle("active");
    arrow.classList.toggle("rotate");
}

    renderCart();

    fetch("footer.html")
    .then(response => response.text())
    .then(data => {
        document.getElementById("footer-section").innerHTML = data;
    });

    window.addEventListener("load", function () {
    setTimeout(() => {
        document.getElementById("preloader").classList.add("fade-out");
    }, 2000);
});

</script>

</body>
</html>
